<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Explorador Estelar | NASA API</title>
    <style>
        body { 
            margin: 0; height: 100vh; background: #000; color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        #bg-nasa {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: -1; transition: 1.5s ease-in-out;
            background-image: url('https://images.unsplash.com/photo-1464802686167-b939a67a06a1?q=80&w=2048&auto=format&fit=crop');
        }

        .info-container {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px; border-top: 3px solid #00d4ff;
            backdrop-filter: blur(15px); max-height: 45vh; overflow-y: auto;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
        }

        h1 { color: #00d4ff; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: clamp(1.2rem, 5vw, 1.8rem); }
        p { line-height: 1.6; color: #ddd; font-size: 1rem; margin-top: 15px; }
        
        .controles {
            position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; align-items: center;
        }

        /* Estilo do Seletor de Data */
        .input-data {
            background: rgba(0,0,0,0.7); color: #00d4ff; border: 1px solid #00d4ff;
            padding: 8px; border-radius: 5px; outline: none; font-family: inherit;
        }

        .btn {
            background: rgba(0,0,0,0.7); color: #00d4ff; border: 1px solid #00d4ff;
            padding: 10px 18px; cursor: pointer; text-decoration: none;
            border-radius: 5px; font-weight: bold; font-size: 0.8rem;
            transition: 0.3s; text-transform: uppercase;
        }

        .btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }

        #google_translate_element { display: none; }
    </style>
</head>
<body>

    <div id="bg-nasa"></div>

    <div class="controles">
        <input type="date" id="data-nasa" class="input-data" onchange="buscarDados()">
        <button class="btn" onclick="traduzirPagina()">🇧🇷 TRADUZIR</button>
        <a href="index.html" class="btn">🏠 VOLTAR</a>
    </div>

    <div class="info-container">
        <h1 id="titulo">Sincronizando com Satélites...</h1>
        <p id="descricao">Aguardando resposta dos servidores da NASA.</p>
        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
            <small id="status-missao" style="color: #00d4ff; font-weight: bold;">[ STATUS: OPERACIONAL ]</small>
        </div>
    </div>

    <div id="google_translate_element"></div>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // Preencher o input com a data de hoje por padrão
        document.getElementById('data-nasa').valueAsDate = new Date();

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }

        function traduzirPagina() {
            const select = document.querySelector('.goog-te-combo');
            if (select) {
                select.value = 'pt';
                select.dispatchEvent(new Event('change'));
            } else {
                alert("O tradutor está carregando...");
            }
        }

        async function buscarDados() {
            const dataEscolhida = document.getElementById('data-nasa').value;
            const titulo = document.getElementById('titulo');
            const descricao = document.getElementById('descricao');
            const status = document.getElementById('status-missao');
            
            // Coloque sua chave aqui:
            const minhaChave = "AY7ULTaneclC8nljDoUGukXjoPlXDdJV710iVcbw"; 
            
            titulo.innerText = "Buscando dados...";
            status.innerText = "[ STATUS: RECEBENDO DADOS ]";

            try {
                const res = await fetch(`https://api.nasa.gov/planetary/apod?api_key=${minhaChave}&date=${dataEscolhida}`);
                
                if (!res.ok) throw new Error("Erro na API");

                const data = await res.json();

                titulo.innerText = data.title;
                descricao.innerText = data.explanation;
                status.innerText = "[ STATUS: OPERACIONAL ]";
                
                if (data.media_type === 'image') {
                    const imgUrl = data.hdurl || data.url;
                    const tempImg = new Image();
                    tempImg.src = imgUrl;
                    tempImg.onload = () => {
                        document.getElementById('bg-nasa').style.backgroundImage = `url('${imgUrl}')`;
                    };
                } else {
                    descricao.innerText += "\n\n(Atenção: O registro de hoje é um vídeo/interativo e não pode ser exibido como fundo).";
                }
            } catch (e) {
                titulo.innerText = "DATA NÃO ENCONTRADA";
                descricao.innerText = "A NASA não possui registros para esta data ou o limite da chave foi atingido. Tente outra data!";
                status.innerText = "[ STATUS: ERRO ]";
            }
        }

        // Inicia a busca ao carregar a página
        buscarDados();
    </script>
</body>
</html>
