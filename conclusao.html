<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conclusão | Luciano Ribeiro</title>
    <style>
        :root {
            --accent: #00d4ff;
            --bg: #050505;
        }

        body {
            margin: 0; height: 100vh; background: var(--bg); color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Fundo com efeito de luz sutil */
        body::before {
            content: ""; position: absolute; width: 300px; height: 300px;
            background: var(--accent); filter: blur(150px); opacity: 0.1;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .container {
            text-align: center; z-index: 10; padding: 40px;
            max-width: 600px; animation: fadeIn 2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { 
            font-size: 3rem; font-weight: 200; letter-spacing: 15px; 
            text-transform: uppercase; margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        p { color: rgba(255,255,255,0.7); font-size: 1.1rem; line-height: 1.8; }

        .contatos {
            display: flex; justify-content: center; gap: 20px; margin-top: 40px;
            flex-wrap: wrap;
        }

        .card-contato {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px; width: 150px; border-radius: 10px;
            text-decoration: none; color: white; transition: 0.4s;
        }

        .card-contato:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }

        .card-contato strong { display: block; color: var(--accent); margin-bottom: 5px; }
        .card-contato span { font-size: 0.8rem; opacity: 0.6; }

        .btn-voltar {
            margin-top: 50px; display: inline-block;
            text-decoration: none; color: var(--accent);
            border: 1px solid var(--accent); padding: 10px 20px;
            border-radius: 50px; font-size: 0.8rem; letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-voltar:hover { background: var(--accent); color: black; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Obrigado</h1>
        <p>Agradeço por explorar este ecossistema digital. <br>
           Espero que a navegação pelo <strong>Cubo Interativo</strong> tenha sido inspiradora.</p>
        
        <div class="contatos">
            <a href="https://wa.me/19999859655" class="card-contato" target="_blank">
                <strong>WhatsApp</strong>
                <span>Vamos conversar?</span>
            </a>

            <a href="https://www.linkedin.com/in/luciano-ribeiro" class="card-contato" target="_blank">
                <strong>LinkedIn</strong>
                <span>Conectar rede</span>
            </a>

            <a href="lucianoperciani1@gmail.com" class="card-contato">
                <strong>E-mail</strong>
                <span>Enviar mensagem</span>
            </a>
        </div>

        <a href="index.html" class="btn-voltar">RECOMEÇAR JORNADA</a>
    </div>

</body>
</html>
